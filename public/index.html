<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的記帳本</title>
  <meta name="description" content="個人雲端記帳本 — 安全記錄您的每筆收支">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== 登入 / 註冊 畫面 ==================== -->
  <div id="authView" class="auth-container" style="display: none;">

    <!-- Login Card -->
    <div id="loginCard" class="auth-card glass">
      <div class="auth-header">
        <h1>我的記帳本</h1>
        <p>歡迎回來！請登入您的帳戶</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginUsername">使用者名稱</label>
          <input type="text" id="loginUsername" class="form-input" required placeholder="請輸入使用者名稱">
        </div>
        <div class="form-group">
          <label for="loginPassword">密碼</label>
          <input type="password" id="loginPassword" class="form-input" required placeholder="請輸入密碼">
        </div>
        <button type="submit" class="btn" id="loginSubmitBtn">安全登入</button>
      </form>

      <div class="auth-toggle">
        還沒有帳戶？ <span id="goToRegister" onclick="toggleAuth(true)">立即註冊</span>
      </div>
    </div>

    <!-- Register Card (Hidden by default) -->
    <div id="registerCard" class="auth-card glass" style="display: none;">
      <div class="auth-header">
        <h1>加入記帳本</h1>
        <p>建立您的個人專屬記帳空間</p>
      </div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="registerUsername">使用者名稱</label>
          <input type="text" id="registerUsername" class="form-input" required placeholder="請輸入使用者名稱">
        </div>
        <div class="form-group">
          <label for="registerPassword">密碼</label>
          <input type="password" id="registerPassword" class="form-input" required placeholder="請輸入 6 位以上密碼">
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">確認密碼</label>
          <input type="password" id="registerConfirmPassword" class="form-input" required placeholder="請再次輸入密碼">
        </div>
        <button type="submit" class="btn" id="registerSubmitBtn">完成註冊</button>
      </form>

      <div class="auth-toggle">
        已經有帳戶？ <span id="goToLogin" onclick="toggleAuth(false)">立即登入</span>
      </div>
    </div>

  </div>

  <!-- ==================== Dashboard 記帳畫面 ==================== -->
  <div id="dashboardView" class="dashboard-container" style="display: none;">

    <!-- Header -->
    <header class="dashboard-header">
      <div class="user-info">
        <div class="user-avatar" id="avatarLetter">U</div>
        <div class="user-text">
          <h2 id="welcomeUsername">載入中...</h2>
          <p>專屬個人雲端記帳本</p>
        </div>
      </div>
      <button onclick="handleLogout()" class="btn btn-logout" id="logoutBtn">登出系統</button>
    </header>

    <!-- Summary Metrics Grid -->
    <section class="summary-grid">
      <div class="summary-card glass card-balance">
        <div class="summary-details">
          <h3>資產剩餘金額</h3>
          <div class="amount" id="netBalance">$0</div>
        </div>
        <div class="summary-icon">💰</div>
      </div>

      <div class="summary-card glass card-income">
        <div class="summary-details">
          <h3>總收入</h3>
          <div class="amount" id="totalIncome">$0</div>
        </div>
        <div class="summary-icon">📈</div>
      </div>

      <div class="summary-card glass card-expense">
        <div class="summary-details">
          <h3>總支出</h3>
          <div class="amount" id="totalExpense">$0</div>
        </div>
        <div class="summary-icon">📉</div>
      </div>
    </section>

    <!-- Workspace -->
    <main class="workspace-grid">

      <!-- Input Transaction Form -->
      <section class="record-form-panel glass">
        <h3 class="panel-title">新增記帳收支</h3>

        <form id="transactionForm" onsubmit="addTransaction(event)">
          <div class="form-group">
            <label>交易類型</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="typeExpense" name="type" value="expense" checked required>
                <label for="typeExpense" class="radio-label label-expense">💸 支出</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="typeIncome" name="type" value="income" required>
                <label for="typeIncome" class="radio-label label-income">💰 收入</label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="descInput">項目描述</label>
            <input type="text" id="descInput" class="form-input" required placeholder="例如：午餐、薪水、捷運車資">
          </div>

          <div class="form-group">
            <label for="amountInput">金額 (TWD)</label>
            <input type="number" id="amountInput" class="form-input" required min="1" step="any" placeholder="請輸入正數金額">
          </div>

          <!-- 帳目分類 (+5 分) -->
          <div class="form-group">
            <label for="categorySelect">帳目分類</label>
            <select id="categorySelect" class="form-input">
              <option value="餐飲">🍔 餐飲</option>
              <option value="交通">🚗 交通</option>
              <option value="娛樂">🎬 娛樂</option>
              <option value="購物">🛍️ 購物</option>
              <option value="醫療">🏥 醫療</option>
              <option value="其他" selected>❓ 其他</option>
            </select>
          </div>

          <button type="submit" class="btn" id="addTransactionBtn">確認送出項目</button>
        </form>
      </section>

      <!-- Ledger Panel (SPA，不重載) -->
      <section class="ledger-panel glass">
        <h3 class="panel-title">收支明細清單</h3>

        <div id="transactionList" class="transaction-list">
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📝</div>
            <p>目前尚無記帳紀錄，請從左側新增！</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Custom Confirm Modal -->
  <div id="confirmModal" class="modal-overlay" style="display: none;">
    <div class="modal-card glass">
      <div class="modal-header">
        <span class="modal-icon">⚠️</span>
        <h3>確認刪除</h3>
      </div>
      <div class="modal-body">
        <p>您確定要刪除這筆收支項目嗎？</p>
      </div>
      <div class="modal-footer">
        <button id="confirmCancelBtn" class="btn btn-secondary">取消</button>
        <button id="confirmConfirmBtn" class="btn btn-danger">確定</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
