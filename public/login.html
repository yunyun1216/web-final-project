<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的記帳本 - 登入 / 註冊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <div class="auth-container">
    <!-- Login Card -->
    <div id="loginCard" class="auth-card glass">
      <div class="auth-header">
        <h1>我的記帳本</h1>
        <p>歡迎回來！請登入您的帳戶</p>
      </div>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginUsername">使用者名稱</label>
          <input type="text" id="loginUsername" class="form-input" required placeholder="請輸入使用者名稱">
        </div>
        <div class="form-group">
          <label for="loginPassword">密碼</label>
          <input type="password" id="loginPassword" class="form-input" required placeholder="請輸入密碼">
        </div>
        <button type="submit" class="btn">安全登入</button>
      </form>
      
      <div class="auth-toggle">
        還沒有帳戶？ <span onclick="toggleAuth(true)">立即註冊</span>
      </div>
    </div>

    <!-- Register Card (Hidden by default) -->
    <div id="registerCard" class="auth-card glass" style="display: none;">
      <div class="auth-header">
        <h1>加入記帳本</h1>
        <p>建立您的個人專屬記帳空間</p>
      </div>
      
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="registerUsername">使用者名稱</label>
          <input type="text" id="registerUsername" class="form-input" required placeholder="請輸入使用者名稱">
        </div>
        <div class="form-group">
          <label for="registerPassword">密碼</label>
          <input type="password" id="registerPassword" class="form-input" required placeholder="請輸入 6 位以上密碼">
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">確認密碼</label>
          <input type="password" id="registerConfirmPassword" class="form-input" required placeholder="請再次輸入密碼">
        </div>
        <button type="submit" class="btn">完成註冊</button>
      </form>
      
      <div class="auth-toggle">
        已經有帳戶？ <span onclick="toggleAuth(false)">立即登入</span>
      </div>
    </div>
  </div>

  <!-- Toast Containers for alerts -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/auth.js"></script>
</body>
</html>
